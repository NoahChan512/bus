<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>🏠 6s Plus 橫向巴士看板 (九巴API穩定版)</title>
    <style>
        :root {
            --bg-color: #0c0c0c;
            --card-bg: #181818;
            --text-main: #ffffff;
            --text-sub: #999999;
            --accent-orange: #ff9f43;
            --accent-green: #2ecc71;
        }

        * { box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 10px;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10px 5px 10px;
            border-bottom: 1px solid #222;
        }

        h1 { font-size: 1.1rem; margin: 0; color: var(--text-sub); }
        .update-time { font-size: 0.8rem; color: var(--accent-green); font-weight: bold; }

        .main-layout {
            display: flex;
            flex: 1;
            gap: 10px;
            margin-top: 10px;
            height: calc(100vh - 45px);
        }

        .column-left { flex: 1.2; display: flex; flex-direction: column; }
        .column-right { flex: 1; display: flex; flex-direction: column; gap: 10px; }

        .station-section {
            background-color: var(--card-bg);
            border-radius: 8px;
            padding: 10px 12px;
            height: 100%;
            display: flex;
            flex-direction: column;
            box-shadow: 0 2px 8px rgba(0,0,0,0.5);
        }

        .column-right .station-section { height: calc(50% - 5px); }
        .station-title {
            font-size: 0.9rem;
            font-weight: bold;
            color: #ecf0f1;
            margin-bottom: 6px;
            padding-bottom: 4px;
            border-bottom: 1px solid #333;
            white-space: nowrap;
        }

        .route-list { flex: 1; display: flex; flex-direction: column; justify-content: space-around; }
        .route-row { display: flex; justify-content: space-between; align-items: center; padding: 2px 0; }
        .route-info { display: flex; align-items: baseline; gap: 8px; }
        .route-name { font-size: 1.3rem; font-weight: 900; color: var(--accent-orange); width: 45px; }
        .route-dest { font-size: 0.75rem; color: var(--text-sub); }
        .eta-info { text-align: right; }
        .eta-main { font-size: 1.15rem; font-weight: bold; }
        .eta-sub { font-size: 0.7rem; color: var(--text-sub); }
        .loading { color: var(--text-sub); font-style: italic; font-size: 0.85rem; text-align: center; margin-top: 20px; }
    </style>
</head>
<body>

    <header>
        <h1>🚍 屋企巴士看板 (6s Plus 橫向專用)</h1>
        <div id="update-time" class="update-time">正在初始化...</div>
    </header>

    <div class="main-layout">
        <div class="column-left">
            <div class="station-section">
                <div class="station-title">📍 宏德居 ➡️ 往藍灣半島</div>
                <div id="station-1" class="route-list"><div class="loading">載入中...</div></div>
            </div>
        </div>

        <div class="column-right">
            <div class="station-section">
                <div class="station-title">📍 環翠 ➡️ 往跑馬地</div>
                <div id="station-2" class="route-list"><div class="loading">載入中...</div></div>
            </div>
            
            <div class="station-section">
                <div class="station-title">📍 環翠 ➡️ 往其他 (82X, 8P)</div>
                <div id="station-3" class="route-list"><div class="loading">載入中...</div></div>
            </div>
        </div>
    </div>

    <script>
        // 配置調整：改為九巴對應的 Stop ID 
        const config = {
            station1: {
                stopId: 'CH06-N-1050-0', // 宏德居
                routes: [
                    { route: '82', dest: '藍灣半島', dir: 'O' },
                    { route: '82X', dest: '藍灣半島', dir: 'O' },
                    { route: '8X', dest: '藍灣半島', dir: 'O' },
                    { route: '8P', dest: '藍灣半島', dir: 'O' }
                ],
                elementId: 'station-1'
            },
            station2: {
                stopId: 'CH06-S-1200-0', // 環翠商場
                routes: [
                    { route: '8X', dest: '跑馬地', dir: 'I' }
                ],
                elementId: 'station-2'
            },
            station3: {
                stopId: 'CH06-S-1200-0', // 環翠商場
                routes: [
                    { route: '82X', dest: '鰂魚涌', dir: 'I' },
                    { route: '8P', dest: '灣仔北', dir: 'I' }
                ],
                elementId: 'station-3'
            }
        };

        async function fetchETA(stopId, targetRoutes) {
            try {
                // 直接呼叫九巴 API，無 CORS 阻擋問題，乾淨利落
                const response = await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/stop-eta/${stopId}`);
                const data = await response.json();
                
                if (!data || !data.data) return [];
                
                let result = [];
                
                targetRoutes.forEach(target => {
                    // 篩選出對應路線以及方向 (九巴API中，城巴港島線多數以 dir: 'O' 或 'I' 區分)
                    let matchedEtas = data.data.filter(item => 
                        item.route === target.route && 
                        (item.dir === target.dir || item.dir === 'B') // 'B'代表循環線/雙向
                    );
                    
                    // 排序並拿第一班車
                    matchedEtas.sort((a, b) => a.eta_seq - b.eta_seq);
                    let nextBus = matchedEtas[0];
                    
                    if (nextBus && nextBus.eta) {
                        // 計算剩餘分鐘
                        const etaTime = new Date(nextBus.eta);
                        const now = new Date();
                        const diffMs = etaTime - now;
                        const rmin = Math.max(0, Math.floor(diffMs / 1000 / 60));
                        
                        result.push({
                            route: target.route,
                            dest: target.dest,
                            etaTime: etaTime,
                            rmin: rmin
                        });
                    } else {
                        result.push({ route: target.route, dest: target.dest, etaTime: null, rmin: -1 });
                    }
                });
                return result;
            } catch (error) {
                console.error("Error fetching KMB/CTB API:", error);
                return null;
            }
        }

        function formatTime(date) {
            if (!date) return '--:--';
            return date.toTimeString().substring(0, 5);
        }

        async function updateDashboard() {
            const now = new Date();
            document.getElementById('update-time').innerText = `更新: ${now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'})}`;

            for (const key in config) {
                const sect = config[key];
                const etas = await fetchETA(sect.stopId, sect.routes);
                const container = document.getElementById(sect.elementId);
                
                if (!etas || etas.length === 0) {
                    container.innerHTML = `<div class="loading">無數據</div>`;
                    continue;
                }

                let htmlContent = '';
                etas.forEach(bus => {
                    let etaDisplay = '';
                    let subDisplay = '';

                    if (bus.rmin === -1) {
                        etaDisplay = '暫無車';
                        subDisplay = '未有班次';
                    } else if (bus.rmin <= 0) {
                        etaDisplay = '已到站';
                        subDisplay = `預計 ${formatTime(bus.etaTime)}`;
                    } else {
                        etaDisplay = `${bus.rmin} <span>分</span>`;
                        subDisplay = `${formatTime(bus.etaTime)}`;
                    }

                    htmlContent += `
                        <div class="route-row">
                            <div class="route-info">
                                <span class="route-name">${bus.route}</span>
                                <span class="route-dest">往${bus.dest}</span>
                            </div>
                            <div class="eta-info">
                                <div class="eta-main">${etaDisplay}</div>
                                <div class="eta-sub">${subDisplay}</div>
                            </div>
                        </div>
                    `;
                });
                container.innerHTML = htmlContent;
            }
        }

        updateDashboard();
        setInterval(updateDashboard, 30000); // 30秒自動更新
    </script>
</body>
</html>
